collection_id: "mini-eval-python-venv-zh-v1"
title: "Mini Eval: Python venv zh-CN"
description: "A real Chinese retrieval mini-eval built from the Python 3.14 zh-CN venv documentation."
slice: "lexical"
source:
  title: "venv --- 创建虚拟环境"
  url: "https://docs.python.org/zh-cn/3.14/library/venv.html"
  source_type: "web"
  version: "Python 3.14 zh-CN docs"
chunking:
  chunk_size: 220
  overlap: 40
evaluation:
  top_k: 5
  strategies:
    - "dense"
    - "bm25"
    - "hybrid"
cases:
  - id: "windows-site-packages"
    query: "Windows 里 site-packages 会落到哪个目录？"
    query_type: "exact-entity"
    expected_winner: "bm25"
    gold_chunk_indexes:
      - 4
    gold_contains:
      - "Lib\\site-packages"
    difficulty: "exact-entity"
  - id: "without-pip-option"
    query: "不想让虚拟环境自动带 pip，要加什么参数？"
    query_type: "parameter"
    expected_winner: "bm25"
    gold_chunk_indexes:
      - 6
    gold_contains:
      - "--without-pip"
      - "跳过在虚拟环境中安装或升级 pip"
    difficulty: "exact-parameter"
  - id: "powershell-execution-policy"
    query: "PowerShell 想运行 Activate.ps1 之前要改什么执行策略？"
    query_type: "setup-instruction"
    expected_winner: "bm25"
    gold_chunk_indexes:
      - 9
    gold_contains:
      - "Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser"
    difficulty: "setup-instruction"
  - id: "venv-detection"
    query: "sys.prefix 和 sys.base_prefix 要怎么看，才能判断是不是虚拟环境？"
    query_type: "code-condition"
    expected_winner: "bm25"
    gold_chunk_indexes:
      - 10
    gold_contains:
      - "sys.prefix != sys.base_prefix"
    difficulty: "code-condition"
  - id: "venv-portability"
    query: "为什么移动虚拟环境后脚本可能失效？"
    query_type: "semantic-explanation"
    expected_winner: "hybrid"
    gold_chunk_indexes:
      - 15
    gold_contains:
      - "虚拟环境在通常情况下都是不可移植的"
    difficulty: "semantic-explanation"
